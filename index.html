<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-zinc-100 selection:bg-amber-500/30 selection:text-amber-500">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's Your Poison? — Premium Drink Finder</title>
  
  <!-- PWA Support -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <meta name="theme-color" content="#fbbf24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="What's Your Poison">
  <link rel="apple-touch-icon" href="./icon.svg">
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Quick reference guide for premium alcoholic and non-alcoholic drinks, perfect serving styles, and curated vegetarian/non-vegetarian food pairings.">
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            playfair: ['Playfair Display', 'serif'],
          },
          colors: {
            zinc: {
              850: '#202024',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Custom Embedded Styles -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Custom Scrollbar for horizontal filter list and main page */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #090514;
    }
    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #fbbf24;
    }
    
    /* Animations */
    .animate-fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Ambient Glow behind search bar */
    .ambient-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, rgba(9, 5, 20, 0) 70%);
      pointer-events: none;
      z-index: 0;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body class="min-h-full flex flex-col items-center pb-12 relative overflow-x-hidden">

  <!-- Background decorative glows -->
  <div class="ambient-glow"></div>
  <div class="absolute w-[600px] h-[600px] rounded-full bg-amber-500/[0.02] blur-[120px] pointer-events-none -top-40 -left-60"></div>
  <div class="absolute w-[500px] h-[500px] rounded-full bg-purple-500/[0.02] blur-[100px] pointer-events-none -bottom-20 -right-40"></div>

  <!-- Main Container -->
  <main class="w-full max-w-lg md:max-w-3xl lg:max-w-5xl px-4 sm:px-6 flex flex-col flex-grow z-10 transition-all duration-300">
    
    <!-- Branding Header -->
    <header class="flex items-center justify-between py-6 mb-4">
      <div class="flex items-center gap-3 cursor-pointer select-none" onclick="window.location.hash=''; window.location.reload();">
        <div class="w-10 h-10 p-1.5 rounded-xl bg-zinc-900 border border-zinc-800/80 shadow-md">
          <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full text-amber-500">
            <!-- Simplified glass inside header -->
            <path d="M128 96 H384 L352 384 C348 416, 320 448, 256 448 C192 448, 164 416, 160 384 Z" fill="currentColor" opacity="0.1" />
            <path d="M128 96 H384 L352 384 C348 416, 320 448, 256 448 C192 448, 164 416, 160 384 Z" stroke="currentColor" stroke-width="32" stroke-linejoin="round" />
            <ellipse cx="256" cy="96" rx="128" ry="20" stroke="currentColor" stroke-width="24" fill="none" />
            <line x1="256" y1="200" x2="256" y2="350" stroke="currentColor" stroke-width="24" stroke-linecap="round" />
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold font-playfair tracking-wide text-zinc-100">What's Your Poison?</h1>
          <p class="text-[10px] uppercase tracking-widest text-amber-500 font-semibold mt-0.5">The Premium Lounge Guide</p>
        </div>
      </div>
      
      <!-- PWA Install Button (Initially hidden) -->
      <button id="pwa-install-btn" class="hidden px-3 py-1.5 text-xs font-semibold rounded-lg bg-amber-500 text-zinc-950 hover:bg-amber-400 active:scale-95 transition-all shadow-lg shadow-amber-500/10">
        Install App
      </button>
    </header>

    <!-- Search Section (Sticky-positioned on scroll) -->
    <div class="sticky top-0 pt-2 pb-4 bg-zinc-950/80 backdrop-blur-md z-30 -mx-4 px-4 sm:-mx-6 sm:px-6">
      <div class="flex gap-2">
        <div class="relative flex-grow">
          <!-- Input fields -->
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          
          <input 
            id="search-input" 
            type="text" 
            placeholder="Search single malt, blended whiskey, beer, tequila..." 
            autocomplete="off"
            class="w-full pl-11 pr-10 py-3.5 bg-zinc-900 border border-zinc-800 focus:border-amber-500/80 focus:ring-1 focus:ring-amber-500/30 rounded-xl text-zinc-100 placeholder-zinc-500 text-sm shadow-xl transition-all duration-300 outline-none"
          />
          
          <!-- Clear input button -->
          <button id="clear-btn" onclick="document.getElementById('search-input').value=''; document.getElementById('search-input').focus(); handleSearchInput();" class="absolute inset-y-0 right-0 pr-4 flex items-center text-zinc-500 hover:text-zinc-300">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <button id="search-btn" class="px-5 py-3.5 bg-amber-500 text-zinc-950 font-bold rounded-xl hover:bg-amber-400 active:scale-95 transition-all duration-200 text-sm shadow-lg shadow-amber-500/10 flex items-center justify-center gap-1.5 min-w-[80px]">
          Search
        </button>
      </div>

      <!-- Autocomplete Dropdown List -->
      <div 
        id="autocomplete-dropdown" 
        class="hidden absolute left-4 right-4 mt-2 max-h-64 overflow-y-auto rounded-xl bg-zinc-950/95 border border-zinc-850 backdrop-blur-xl shadow-2xl z-40 divide-y divide-zinc-900"
      >
        <!-- Dynamic dropdown items injected here by index.js -->
      </div>
    </div>

    <!-- Quick Category Filter Pills -->
    <div id="category-filters" class="flex gap-2 overflow-x-auto pb-4 pt-2 -mx-4 px-4 sm:-mx-6 sm:px-6 scrollbar-none scroll-smooth">
      <!-- Pills generated dynamically -->
    </div>

    <!-- Content Sections -->
    <div class="flex-grow mt-2 flex flex-col">
      <!-- Recommendations Placeholder View (Default) -->
      <div id="placeholder-container" class="flex-grow flex flex-col justify-start">
        <!-- Rendered dynamically -->
      </div>

      <!-- Detail Results Card View -->
      <div id="results-container" class="hidden flex-grow flex flex-col justify-start">
        <!-- Injected dynamically on search select -->
      </div>
    </div>

    <!-- Bottom footer -->
    <footer class="mt-12 text-center border-t border-zinc-900 pt-6">
      <p class="text-xs text-zinc-600 font-medium">Drink responsibly. Please verify standard ABVs with local regulations.</p>
      <p class="text-[10px] text-zinc-700 mt-1">&copy; 2026 What's Your Poison? Project. All rights reserved.</p>
    </footer>

  </main>

  <!-- PWA Install prompt listener helper -->
  <script>
    let deferredPrompt;
    const installBtn = document.getElementById('pwa-install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent the mini-infobar from appearing on mobile
      e.preventDefault();
      // Stash the event so it can be triggered later.
      deferredPrompt = e;
      // Update UI notify the user they can install the PWA
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      // Show the install prompt
      deferredPrompt.prompt();
      // Wait for the user to respond to the prompt
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User response to install prompt: ${outcome}`);
      // We've used the prompt, and can't use it again, discard it
      deferredPrompt = null;
      // Hide the install button
      installBtn.classList.add('hidden');
    });

    window.addEventListener('appinstalled', (event) => {
      console.log('What\'s Your Poison PWA was installed successfully');
      installBtn.classList.add('hidden');
    });
  </script>

  <!-- App logic link -->
  <script src="./index.js"></script>
</body>
</html>
