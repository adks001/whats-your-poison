<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#090514" />
    </radialGradient>
    <!-- Amber Liquid Gradient -->
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <!-- Gold Rim/Glow Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Circular Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="8" />
  
  <!-- Glowing aura -->
  <circle cx="256" cy="256" r="160" fill="#f59e0b" opacity="0.1" filter="url(#glow)" />
  
  <g transform="translate(128, 96)">
    <!-- Ice Cube Back -->
    <rect x="90" y="110" width="70" height="70" rx="10" transform="rotate(15, 125, 145)" fill="#ffffff" opacity="0.3" />
    
    <!-- Liquid in Glass -->
    <path d="M 40 120 L 216 120 L 196 230 C 196 245, 176 260, 128 260 C 80 260, 60 245, 60 230 Z" fill="url(#liquidGrad)" />
    
    <!-- Ice Cube Front -->
    <rect x="70" y="140" width="80" height="80" rx="12" transform="rotate(-10, 110, 180)" fill="#ffffff" opacity="0.5" stroke="#fef08a" stroke-width="2" />
    
    <!-- Glass Body Outline -->
    <path d="M 20 50 L 236 50 L 206 235 C 203 255, 178 275, 128 275 C 78 275, 53 255, 50 235 Z" fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linejoin="round" />
    
    <!-- Glass Rim Highlight -->
    <ellipse cx="128" cy="50" rx="108" ry="12" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8" />
    
    <!-- Lemon Wheel garnish -->
    <circle cx="210" cy="50" r="35" fill="#fef08a" stroke="#ca8a04" stroke-width="4" />
    <path d="M 210 15 L 210 85 M 175 50 L 245 50 M 185 25 L 235 75 M 185 75 L 235 25" stroke="#ca8a04" stroke-width="2" opacity="0.6" />
    <circle cx="210" cy="50" r="31" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8" />
  </g>
</svg>
